name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore google-services.json from secret
        shell: bash
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          mkdir -p app

          if [ -n "${GOOGLE_SERVICES_JSON_B64:-}" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON_B64" | base64 -d > app/google-services.json
            echo "google-services.json restored from GOOGLE_SERVICES_JSON_B64"
          elif [ -n "${GOOGLE_SERVICES_JSON:-}" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
            echo "google-services.json restored from GOOGLE_SERVICES_JSON"
          else
            echo "google-services.json secret not provided; build will continue without Firebase config"
          fi

      - name: Write local.properties
        shell: bash
        run: |
          set -euo pipefail
          SDK_PATH="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK_PATH" ]; then
            echo "Android SDK path is not available" >&2
            exit 1
          fi
          printf 'sdk.dir=%s\n' "$SDK_PATH" > local.properties
          cat local.properties

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Prepare CI log directory
        shell: bash
        run: mkdir -p .github-ci-logs

      - name: Assemble debug and release APK
        shell: bash
        env:
          TGWEB_STORE_PASSWORD: ${{ secrets.TGWEB_STORE_PASSWORD }}
          TGWEB_KEY_ALIAS: ${{ secrets.TGWEB_KEY_ALIAS }}
          TGWEB_KEY_PASSWORD: ${{ secrets.TGWEB_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --console=plain :app:assembleDebug :app:assembleRelease 2>&1 | tee .github-ci-logs/gradle-build.log

      - name: Expose Gradle failure tail
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY2'
from pathlib import Path
log_path = Path('.github-ci-logs/gradle-build.log')
if not log_path.exists():
    raise SystemExit(0)
content = log_path.read_text(errors='replace')
lines = content.splitlines()
tail = '
'.join(lines[-220:])
message = tail[-60000:]
message = message.replace('%', '%25').replace('', '%0D').replace('
', '%0A')
print(f"::error title=Gradle failure tail::{message}")
PY2

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: flygram-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: flygram-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload CI logs and build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flygram-ci-logs
          path: |
            .github-ci-logs
            app/build/reports
            **/build/reports
            **/build/outputs/logs
          if-no-files-found: ignore
